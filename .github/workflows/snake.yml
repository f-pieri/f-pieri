name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk/svg-only@v3
        with:
          github_user_name: f-pieri
          github_token: ${{ secrets.GH_TOKEN }}
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=%2360a5fa&color_dots=%230369a1,%230ea5e9,%2338bdf8,%237dd3fc,%23bae6fd
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=%2360a5fa&color_dots=%230369a1,%230ea5e9,%2338bdf8,%237dd3fc,%23bae6fd
      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
