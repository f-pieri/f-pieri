name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: f-pieri
          github_token: ${{ secrets.GH_TOKEN }}
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#60a5fa
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#60a5fa
      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
